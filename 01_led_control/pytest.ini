[pytest]
# Register custom marks to avoid "Unknown mark" warnings
markers =
    qemu: Mark test to run in the QEMU emulator.
    generic: Mark test to run on generic hardware.
    host_test: Mark test to run on the host machine.

# Suppress experimental API warnings from pytest-embedded
filterwarnings =
    ignore::pytest.PytestExperimentalApiWarning

# Default options
addopts = -s --embedded-services idf,qemu
